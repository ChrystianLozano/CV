<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Metallic chrome gradient for rings -->
    <linearGradient id="chrome-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f7" />
      <stop offset="35%" stop-color="#e8e8ed" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="65%" stop-color="#86868b" />
      <stop offset="100%" stop-color="#1d1d1f" />
    </linearGradient>
    <!-- Sphere-like 3D gradient for the central bead -->
    <radialGradient id="bead-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#a1a1a6" />
      <stop offset="90%" stop-color="#1d1d1f" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
  </defs>
  <style>
    .ring-outer {
      stroke: url(#chrome-grad);
      stroke-width: 2.8;
      fill: none;
      opacity: 0.95;
    }
    .ring-middle {
      stroke: url(#chrome-grad);
      stroke-width: 2.2;
      fill: none;
      opacity: 0.85;
    }
    .ring-inner {
      stroke: url(#chrome-grad);
      stroke-width: 1.6;
      fill: none;
      opacity: 0.75;
    }
    .core {
      fill: url(#bead-grad);
    }
    @media (prefers-color-scheme: light) {
      .ring-outer {
        stroke: #1d1d1f;
        opacity: 1;
      }
      .ring-middle {
        stroke: #424245;
        opacity: 0.9;
      }
      .ring-inner {
        stroke: #86868b;
        opacity: 0.8;
      }
      .core {
        fill: #1d1d1f;
      }
    }
  </style>
  <!-- Gyroscope concentric rings, tilted to mimic 3D depth -->
  <ellipse cx="32" cy="32" rx="26" ry="13" transform="rotate(-25 32 32)" class="ring-outer" />
  <ellipse cx="32" cy="32" rx="19" ry="9.5" transform="rotate(35 32 32)" class="ring-middle" />
  <ellipse cx="32" cy="32" rx="12" ry="6" transform="rotate(-70 32 32)" class="ring-inner" />
  <!-- Central bead core -->
  <circle cx="32" cy="32" r="4.5" class="core" />
</svg>
